# 민감값: backend/.env (gitignore). Spring Boot는 .env를 안 읽어서 BackendApplication에서 로드함.
spring.application.name=pnn-backend

# Server
server.port=8080

# PostgreSQL (비밀번호·키: .env 의 SPRING_DATASOURCE_PASSWORD 등 또는 OS 환경 변수)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pnn-db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (테이블 없음 — validate 시 연결만 확인)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Hibernate 로그 출력 최소화
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Python AI Server URL
ai.server.url=http://localhost:8000

# Multipart Upload Size Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger (springdoc-openapi 2.8.x) — API 문서 및 Try-it-out 테스트
# 접속 URL: http://localhost:8080/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/v3/api-docs

# ============================================================
# Public Data API Keys & URLs
# - 출처: 공공데이터포털 (data.go.kr)
# - 키: .env 의 API_PUBLIC_DRUG_KEY
# ============================================================

# [의약품 관련 API 키] 식품의약품안전처 - 의약품 낱알식별/허가정보 등에 공통 사용
api.public.drug.key=${API_PUBLIC_DRUG_KEY:}

# [의약품 낱알식별 정보 조회] 식약처 MdcinGrnIdntfcInfoService03
# 용도: drugs + drug_identification 테이블 적재 (모양, 색상, 이미지 URL 등)
api.public.drug-identification.url=http://apis.data.go.kr/1471000/MdcinGrnIdntfcInfoService03/getMdcinGrnIdntfcInfoList03

# [의약품 허가 상세정보] 식약처 DrugPrdtPrmsnInfoService07
# 용도: drugs 테이블 보강 (원료성분, 주성분, ATC코드, 전문/일반 구분 등)
api.public.drug-permission-detail.url=http://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07/getDrugPrdtPrmsnDtlInq06

# [의약품 주성분 상세정보] 식약처 DrugPrdtPrmsnInfoService07
# 용도: drug_ingredients 테이블 적재 (개별 성분명, 분량, 단위, 영문명)
api.public.drug-ingredient.url=http://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07/getDrugPrdtMcpnDtlInq07



# ============================================================
# 식품안전나라 API (openapi.foodsafetykorea.go.kr)
# - 키: .env 의 API_FOODSAFETY_KEY
# ============================================================

# [건강기능식품 품목제조 신고사항] 서비스 I0030
# 용도: supplements 테이블 적재 (품목명, 기능성, 원재료, 섭취방법 등)
api.foodsafety.key=${API_FOODSAFETY_KEY:}
api.foodsafety.supplement.url=http://openapi.foodsafetykorea.go.kr/api
spring.output.ansi.enabled=ALWAYS
